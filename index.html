<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Vamika ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #ffe9c9);
}

/* 🐼 PANDA (EMOJI ANIMATION) */
#panda {
  position: absolute;
  bottom: 20px;
  left: -100px;
  font-size: 70px;
}

/* WALK ANIMATION */
.walk {
  animation: bounce 0.4s infinite alternate;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-10px); }
}

/* ROPE */
#rope {
  position: absolute;
  top: 0;
  left: 50%;
  width: 30px;
  height: 220px;
  cursor: pointer;
}

/* visible rope line */
#rope::after {
  content: "";
  display: block;
  width: 4px;
  height: 220px;
  background: black;
  margin: auto;
}

/* HELP TEXT */
#help {
  position: absolute;
  top: 230px;
  width: 100%;
  text-align: center;
  font-size: 1.4em;
  color: #ff4d6d;
  display: none;
  font-weight: bold;
}

/* BANNER */
#banner {
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  background: #ff4d6d;
  color: white;
  padding: 20px 40px;
  font-size: 2em;
  border-radius: 12px;
  transition: top 1s ease;
}

/* MESSAGE */
#message {
  position: absolute;
  top: 200px;
  width: 100%;
  text-align: center;
  font-size: 1.2em;
  color: #444;
}

/* CONFETTI */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  top: 0;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<!-- 🎵 LOCAL SOUND (ensure works) -->
<audio id="music">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=happy-birthday-254480.mp3" type="audio/mp3">
</audio>

<!-- 🐼 ANIMATED PANDA -->
<div id="panda" class="walk">🐼</div>

<div id="rope"></div>

<div id="help">🐼 HELP! pull this rope down 🪢</div>

<div id="banner">🎉 Happy Birthday Vamika 🎉</div>

<div id="message"></div>

<script>
const panda = document.getElementById('panda');
const rope = document.getElementById('rope');
const banner = document.getElementById('banner');
const help = document.getElementById('help');
const music = document.getElementById('music');
const message = document.getElementById('message');

let pulled = false;

/* 🐼 WALKING PANDA */
let pos = -100;
let walk = setInterval(() => {
  pos += 4;
  panda.style.left = pos + "px";

  if (pos >= window.innerWidth * 0.42) {
    clearInterval(walk);
    panda.classList.remove("walk");

    // jump
    panda.style.transform = "translateY(-60px)";
    setTimeout(() => panda.style.transform = "translateY(0)", 300);

    setTimeout(() => {
      help.style.display = "block";
    }, 600);
  }
}, 30);

/* 🎯 CLICK (UNLOCK SOUND) */
document.body.addEventListener("click", () => {
  music.play().catch(()=>{});
}, { once: true });

/* 🎯 ROPE CLICK */
rope.onclick = () => {
  if (pulled) return;
  pulled = true;

  music.currentTime = 0;
  music.play();

  panda.style.transform = "translateY(-80px)";
  setTimeout(() => panda.style.transform = "translateY(0)", 300);

  banner.style.top = "80px";

  showMessage();
  createConfetti();
};

/* 💖 MESSAGE */
function showMessage() {
  message.innerHTML = `
  ✨ Dear Vamika ✨ <br><br>
  Aaj ka din sirf tumhara hai 💖<br>
  Tumhari smile sab kuch beautiful bana deti hai 🌸<br><br>
  Tum bahut special ho ❤️<br><br>
  🎂 Happy Birthday 🎂
  `;
}

/* 🎉 CONFETTI */
function createConfetti() {
  for (let i = 0; i < 70; i++) {
    let c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * window.innerWidth + 'px';
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (2 + Math.random()*3) + 's';
    document.body.appendChild(c);
  }
}
</script>

</body>
</html>
