<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vamika 🎂</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #ffe9c9);
}

/* 🐼 PANDA */
#panda {
  position: absolute;
  bottom: 20px;
  left: -100px;
  font-size: 70px;
}

/* WALK */
.walk {
  animation: bounce 0.4s infinite alternate;
}

@keyframes bounce {
  from { transform: translateY(0); }
  to { transform: translateY(-10px); }
}

/* ROPE */
#rope {
  position: absolute;
  top: 0;
  left: 50%;
  width: 60px;
  height: 220px;
  cursor: pointer;
}

#rope::after {
  content: "";
  display: block;
  width: 4px;
  height: 220px;
  background: black;
  margin: auto;
}

/* BANNER */
#banner {
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  background: #ff4d6d;
  color: white;
  padding: 20px 40px;
  font-size: 2em;
  border-radius: 12px;
  transition: top 1s ease;
}

/* MESSAGE */
#message {
  position: absolute;
  top: 200px;
  width: 100%;
  text-align: center;
  font-size: 1.2em;
  color: #444;
  opacity: 0;
  transition: opacity 1.5s;
}

/* HELP TEXT */
#help {
  position: absolute;
  top: 230px;
  width: 100%;
  text-align: center;
  font-size: 1.4em;
  color: #ff4d6d;
  display: none;
  font-weight: bold;
}

/* CONFETTI */
.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  top: 0;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<!-- 🎵 AUDIO (LOCAL FILE) -->
<audio id="music" preload="auto" loop>
  <source src="birthday.mp3" type="audio/mpeg">
</audio>

<!-- 🐼 PANDA -->
<div id="panda" class="walk">🐼</div>

<div id="rope"></div>

<div id="banner">🎉 Happy Birthday Vamika 🎉</div>

<div id="help">🐼 HELP! pull this rope 👇</div>

<div id="message"></div>

<script>
const panda = document.getElementById('panda');
const rope = document.getElementById('rope');
const banner = document.getElementById('banner');
const message = document.getElementById('message');
const help = document.getElementById('help');
const music = document.getElementById('music');

let pulled = false;

/* 🐼 PANDA WALK */
let pos = -100;
let walk = setInterval(() => {
  pos += 4;
  panda.style.left = pos + "px";

  if (pos >= window.innerWidth * 0.42) {
    clearInterval(walk);
    panda.classList.remove("walk");

    panda.style.transform = "translateY(-60px)";
    setTimeout(() => panda.style.transform = "translateY(0)", 300);

    setTimeout(() => {
      help.style.display = "block";
    }, 500);
  }
}, 30);

/* 🔓 SOUND UNLOCK (CRITICAL) */
document.body.addEventListener("click", () => {
  music.muted = true;
  music.play().then(() => {
    music.pause();
    music.currentTime = 0;
    music.muted = false;
  }).catch(()=>{});
}, { once: true });

/* 🎯 ROPE CLICK */
rope.addEventListener("click", () => {
  if (pulled) return;
  pulled = true;

  music.currentTime = 0;
  music.play().catch(err => console.log(err));

  panda.style.transform = "translateY(-80px)";
  setTimeout(() => panda.style.transform = "translateY(0)", 300);

  banner.style.top = "80px";

  message.style.opacity = 1;
  message.innerHTML = `
    ✨ Dear Vamika ✨ <br><br>
    Aaj ka din sirf tumhara hai 💖<br>
    Tumhari smile sab kuch beautiful bana deti hai 🌸<br><br>
    Tum bahut special ho ❤️<br><br>
    🎂 Happy Birthday 🎂
  `;

  createConfetti();
});

/* 🎉 CONFETTI */
function createConfetti() {
  for (let i = 0; i < 80; i++) {
    let c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * window.innerWidth + 'px';
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (2 + Math.random()*3) + 's';
    document.body.appendChild(c);
  }
}
</script>

</body>
</html>
