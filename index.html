<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Vamika 🎂</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #ffe9c9);
}

#panda {
  position: absolute;
  bottom: 20px;
  left: -150px;
  width: 120px;
  transition: left 2s ease, bottom 0.5s ease;
}

#rope {
  position: absolute;
  top: 0;
  left: 50%;
  width: 8px;
  height: 220px;
  background: #333;
  cursor: grab;
}

#banner {
  position: absolute;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  background: #ff4d6d;
  color: white;
  padding: 20px 40px;
  font-size: 2em;
  border-radius: 12px;
  text-align: center;
  transition: top 1s ease;
}

#message {
  position: absolute;
  top: 200px;
  width: 100%;
  text-align: center;
  font-size: 1.3em;
  color: #444;
  opacity: 0;
  transition: opacity 2s ease;
  padding: 0 20px;
}

.confetti {
  position: absolute;
  width: 10px;
  height: 10px;
  top: 0;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<!-- 🎵 LOCAL SONG -->
<audio id="bgMusic" src="song.mp3"></audio>

<img id="panda" src="https://cdn-icons-png.flaticon.com/512/616/616408.png">
<div id="rope"></div>

<div id="banner">🎉 Happy Birthday Vamika 🎉</div>

<div id="message">
  ✨ Dear Vaishnavi ✨ <br><br>
  Aaj ka din sirf tumhara hai 💖<br>
  Tumhari smile duniya ko aur beautiful banati hai 🌸<br>
  Har khushi tumhe mile, har sapna pura ho ✨<br><br>
  You are truly special and deserve all the love in the world ❤️<br>
  Stay khush, stay amazing hamesha 💫<br><br>
  💌 Happy Birthday once again 💌
</div>

<script>
const panda = document.getElementById('panda');
const rope = document.getElementById('rope');
const banner = document.getElementById('banner');
const message = document.getElementById('message');
const music = document.getElementById('bgMusic');

// Panda run
setTimeout(() => {
  panda.style.left = '42%';
}, 500);

let pulled = false;

rope.addEventListener('click', () => {
  if (pulled) return;
  pulled = true;

  // 🎵 Play Music
  music.play();

  // Panda jump
  panda.style.bottom = '100px';
  setTimeout(()=>{
    panda.style.bottom = '20px';
  },500);

  // Banner drop
  setTimeout(()=>{
    banner.style.top = '80px';
  },400);

  // Message show
  setTimeout(()=>{
    message.style.opacity = 1;
  },1200);

  // Confetti
  for (let i = 0; i < 50; i++) {
    let c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * window.innerWidth + 'px';
    c.style.background = `hsl(${Math.random()*360},100%,50%)`;
    c.style.animationDuration = (2 + Math.random()*3) + 's';
    document.body.appendChild(c);
  }
});
</script>

</body>
</html>
